name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lfx
          POSTGRES_PASSWORD: lfx_test
          POSTGRES_DB: auth_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lfx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Prisma migrations (test DB)
        env:
          AUTH_DATABASE_URL: postgresql://lfx:lfx_test@localhost:5432/auth_db_test
        run: npx prisma migrate deploy

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        env:
          AUTH_DATABASE_URL: postgresql://lfx:lfx_test@localhost:5432/auth_db_test
          JWT_SECRET: test_jwt_secret_that_is_at_least_32_chars_long
          TOTP_ENCRYPTION_KEY: test_totp_key_that_is_32_chars_long!!
          REDIS_URL: redis://localhost:6379
          KAFKA_BROKERS: localhost:9092
        run: npm test

  build-docker:
    runs-on: ubuntu-latest
    needs: test-and-lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            livefxhub/auth-service:latest
            livefxhub/auth-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
