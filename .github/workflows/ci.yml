name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lfx
          POSTGRES_PASSWORD: lfx_test
          POSTGRES_DB: auth_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lfx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Prisma migrations (test DB)
        env:
          AUTH_DATABASE_URL: postgresql://lfx:lfx_test@localhost:5432/auth_db_test
        run: npx prisma migrate deploy

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        env:
          AUTH_DATABASE_URL: postgresql://lfx:lfx_test@localhost:5432/auth_db_test
          JWT_SECRET: test_jwt_secret_that_is_at_least_32_chars_long
          TOTP_ENCRYPTION_KEY: test_totp_key_that_is_32_chars_long!!
          REDIS_URL: redis://localhost:6379
          KAFKA_BROKERS: localhost:9092
        run: npm test

  deploy-to-k3s:
    runs-on: ubuntu-latest
    needs: test-and-lint
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy securely over SSH (Direct Build)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Navigate to where your code is on the server
            cd /v3/auth-service
            
            # Pull latest code from github directly onto the server
            git pull origin main
            
            # Build the fresh local image natively
            docker build -t auth-service:local .
            
            # Since you're using k3s, save and import it directly into the cluster runtime
            docker save auth-service:local | sudo k3s ctr images import -
            
            # Force Kubernetes to restart the deployment and pick up the latest auth-service:local image
            kubectl rollout restart deployment/auth-service -n default
