# ─────────────────────────────────────────────────────────────────────────────
# LiveFXHub V3 — Local Development Infrastructure
#
# PROFILES:
#   localdb  — PostgreSQL x7 + Redis (use when NOT connected to real server)
#   messaging — Kafka + RabbitMQ (always needed for local dev)
#
# COMMANDS:
#   Using REAL server DBs (via WireGuard) + local Kafka only:
#     docker compose --profile messaging up -d
#
#   Full local stack (no WireGuard needed):
#     docker compose --profile localdb --profile messaging up -d
#
#   Start only Kafka (most common during active development):
#     docker compose up -d kafka kafka-init rabbitmq
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ──────────────────── PostgreSQL Databases (profile: localdb) ────────────
  # Only start these if NOT using the real server via WireGuard
  auth-db:
    profiles: [localdb]
    image: postgres:16-alpine
    container_name: lfx-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lfx
      POSTGRES_PASSWORD: lfx_dev_secret
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lfx -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-db:
    profiles: [localdb]
    image: postgres:16-alpine
    container_name: lfx-user-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lfx
      POSTGRES_PASSWORD: lfx_dev_secret
      POSTGRES_DB: user_db
    ports:
      - "5433:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lfx -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    profiles: [localdb]
    image: postgres:16-alpine
    container_name: lfx-order-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lfx
      POSTGRES_PASSWORD: lfx_dev_secret
      POSTGRES_DB: order_db
    ports:
      - "5434:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lfx -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  execution-db:
    profiles: [localdb]
    image: postgres:16-alpine
    container_name: lfx-execution-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lfx
      POSTGRES_PASSWORD: lfx_dev_secret
      POSTGRES_DB: execution_db
    ports:
      - "5435:5432"
    volumes:
      - execution_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lfx -d execution_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  risk-db:
    profiles: [localdb]
    image: postgres:16-alpine
    container_name: lfx-risk-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lfx
      POSTGRES_PASSWORD: lfx_dev_secret
      POSTGRES_DB: risk_db
    ports:
      - "5436:5432"
    volumes:
      - risk_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lfx -d risk_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics-db:
    profiles: [localdb]
    image: timescale/timescaledb:latest-pg16
    container_name: lfx-analytics-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lfx
      POSTGRES_PASSWORD: lfx_dev_secret
      POSTGRES_DB: analytics_db
    ports:
      - "5437:5432"
    volumes:
      - analytics_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lfx -d analytics_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin-db:
    profiles: [localdb]
    image: postgres:16-alpine
    container_name: lfx-admin-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lfx
      POSTGRES_PASSWORD: lfx_dev_secret
      POSTGRES_DB: admin_db
    ports:
      - "5438:5432"
    volumes:
      - admin_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lfx -d admin_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-local:
    profiles: [localdb]
    image: redis:7-alpine
    container_name: lfx-redis-local
    restart: unless-stopped
    # Single node, no cluster — for local dev only
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────── Kafka (KRaft, no Zookeeper) — always local ──────────
  # Two listeners:
  #   INTERNAL  kafka:9092   → used by kafka-init and all service containers
  #   EXTERNAL  localhost:29092 → used from your host machine (npm run dev)
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: lfx-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "29092:29092"   # Host machine connects here (localhost:29092)
      - "9092:9092"     # Internal Docker network port (exposed for health check)
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.7.0
    container_name: lfx-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic orders.received --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic orders.approved --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic orders.executed --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic orders.closed --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic orders.rejected --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic provider.callbacks --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic user.journal.events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic mam.allocate --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic copy.replicate --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic market.data.tick --partitions 12 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic risk.check.request --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic portfolio.update --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic bonus.lots.update --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic user.register --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic announcement.published --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic notification.push --partitions 3 --replication-factor 1
      echo 'All Kafka topics created.'
      "

  # ──────────────────── RabbitMQ — always local ─────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: lfx-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: lfx
      RABBITMQ_DEFAULT_PASS: lfx_rabbit_dev
      RABBITMQ_DEFAULT_VHOST: livefxhub
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI → http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  auth_db_data:
  user_db_data:
  order_db_data:
  execution_db_data:
  risk_db_data:
  analytics_db_data:
  admin_db_data:
  redis_data:
  kafka_data:
  rabbitmq_data:
